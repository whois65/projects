<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathRef — Unified Formula Library</title>
<script>window.MathJax={tex:{inlineMath:[['\\(','\\)']]},svg:{fontCache:'global'},options:{skipHtmlTags:['script','noscript','style']}};</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ff-head:'DM Serif Display',serif;
  --ff-body:'DM Sans',sans-serif;
  --ff-mono:'JetBrains Mono',monospace;
  --tr:0.16s cubic-bezier(0.4,0,0.2,1);
  --r:8px;--r-lg:14px;--r-xl:20px;
}
[data-theme="dark"]{
  --bg:#0e0e13;--bg2:#13131a;--surface:#1a1a24;--surface2:#21212e;
  --border:rgba(255,255,255,0.07);--border-s:rgba(255,255,255,0.13);
  --tx1:#eeeaf8;--tx2:#8b89a8;--tx3:#3e3e52;
  --acc:#7c6af7;--acc2:#a899ff;--acc-s:rgba(124,106,247,0.12);--acc-g:rgba(124,106,247,0.22);
  --teal:#3dbfb0;--teal-s:rgba(61,191,176,0.1);
  --rose:#f06070;--rose-s:rgba(240,96,112,0.1);
  --amber:#f0a830;--amber-s:rgba(240,168,48,0.1);
  --grn:#4ecb84;--grn-s:rgba(78,203,132,0.1);
  --shadow:0 24px 64px rgba(0,0,0,0.55);
}
[data-theme="light"]{
  --bg:#f4f3fa;--bg2:#eceaf5;--surface:#ffffff;--surface2:#f7f6fc;
  --border:rgba(0,0,0,0.07);--border-s:rgba(0,0,0,0.14);
  --tx1:#1a1830;--tx2:#6260808;--tx3:#b8b6cc;
  --acc:#5a4ae8;--acc2:#7c6af7;--acc-s:rgba(90,74,232,0.09);--acc-g:rgba(90,74,232,0.17);
  --teal:#1a9e92;--teal-s:rgba(26,158,146,0.08);
  --rose:#d94050;--rose-s:rgba(217,64,80,0.08);
  --amber:#c8840e;--amber-s:rgba(200,132,14,0.08);
  --grn:#1f9e58;--grn-s:rgba(31,158,88,0.08);
  --shadow:0 12px 40px rgba(0,0,0,0.1);
  --tx2:#636280;
}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:var(--ff-body);color:var(--tx1);min-height:100vh;font-size:15px;line-height:1.6;transition:background var(--tr),color var(--tr)}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:60;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;height:58px;gap:1rem;backdrop-filter:blur(16px)}
.nav-logo{font-family:var(--ff-head);font-size:1.3rem;color:var(--tx1);flex-shrink:0;display:flex;align-items:center;gap:9px;letter-spacing:-0.2px}
.logo-mark{width:28px;height:28px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-head);font-size:13px;color:#fff;font-style:italic}
.search-box{flex:1;max-width:380px;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr)}
.search-box:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-s)}
.search-box svg{margin:0 10px;color:var(--tx3);flex-shrink:0}
.search-box input{flex:1;background:none;border:none;outline:none;font-family:var(--ff-body);font-size:14px;color:var(--tx1);padding:9px 10px 9px 0}
.search-box input::placeholder{color:var(--tx3)}
.nav-right{display:flex;gap:6px;align-items:center;margin-left:auto}
.nav-btn{height:34px;padding:0 12px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--tx2);transition:all var(--tr);white-space:nowrap;font-family:var(--ff-body)}
.nav-btn:hover{background:var(--surface2);color:var(--tx1);border-color:var(--border-s)}
.nav-btn.active{background:var(--acc-s);color:var(--acc);border-color:rgba(124,106,247,0.25)}
.nav-btn svg{flex-shrink:0}
.fav-dot{width:16px;height:16px;background:var(--acc);color:#fff;border-radius:50%;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.fav-dot.on{display:flex}

/* ── TABS ── */
.tabs-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 1.5rem;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--tr);white-space:nowrap;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--tx1)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.tab-badge{font-size:10px;background:var(--surface2);color:var(--tx3);border-radius:99px;padding:1px 6px;border:1px solid var(--border)}
.tab.active .tab-badge{background:var(--acc-s);color:var(--acc);border-color:transparent}

/* ── LAYOUT ── */
.app-body{max-width:1140px;margin:0 auto;padding:1.5rem 1.5rem 4rem;display:grid;grid-template-columns:210px 1fr;gap:1.75rem}
@media(max-width:780px){.app-body{grid-template-columns:1fr}.sidebar{display:none}}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:100px;height:fit-content;display:flex;flex-direction:column;gap:4px}
.sb-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);padding:0 10px;margin-bottom:4px;margin-top:8px}
.sb-link{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;transition:all var(--tr);border:1px solid transparent}
.sb-link:hover{background:var(--surface);color:var(--tx1);border-color:var(--border)}
.sb-link.active{background:var(--acc-s);color:var(--acc);border-color:rgba(124,106,247,0.2)}
.sb-badge{font-size:10px;background:var(--surface2);color:var(--tx3);border-radius:99px;padding:1px 7px;border:1px solid var(--border)}
.sb-link.active .sb-badge{background:var(--acc-s);color:var(--acc);border-color:transparent}
.sb-divider{height:1px;background:var(--border);margin:8px 0}
.progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-top:4px}
.prog-label{font-size:11px;color:var(--tx3);font-weight:600;letter-spacing:0.5px;margin-bottom:10px}
.prog-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;transition:width 0.6s ease}
.prog-stats{display:flex;justify-content:space-between;font-size:11px;color:var(--tx2)}

/* ── SECTION ── */
.cat-section{margin-bottom:1.5rem}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;cursor:pointer;user-select:none;transition:background var(--tr)}
.sec-header:hover{background:var(--surface2)}
.sec-header.collapsed{border-radius:var(--r-lg)}
.sec-title-row{display:flex;align-items:center;gap:10px}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:var(--ff-mono);flex-shrink:0}
.sec-name{font-family:var(--ff-head);font-size:1rem;font-weight:500;color:var(--tx1)}
.sec-count{font-size:11px;color:var(--tx3);margin-top:1px}
.sec-arrow{font-size:11px;color:var(--tx3);transition:transform var(--tr)}
.sec-header.collapsed .sec-arrow{transform:rotate(-90deg)}
.cards-grid{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-lg) var(--r-lg);overflow:hidden}

/* ── FORMULA CARD ── */
.fcard{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--border);transition:background var(--tr);cursor:pointer}
.fcard:last-child{border-bottom:none}
.fcard:hover{background:var(--surface2)}
.fcard.learned{border-left:3px solid var(--grn)}
.fcard-formula{font-size:15px;line-height:1.5;color:var(--tx1);margin-bottom:2px;overflow-x:auto;scrollbar-width:none}
.fcard-formula::-webkit-scrollbar{display:none}
.fcard-desc{font-size:12px;color:var(--tx2)}
.fcard-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.act{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3);transition:all var(--tr)}
.act:hover{background:var(--surface2);color:var(--tx1);border-color:var(--border-s)}
.act.bm.on{color:var(--amber);border-color:var(--amber);background:var(--amber-s)}
.act.lrn.on{color:var(--grn);border-color:var(--grn);background:var(--grn-s)}

/* grid view */
.cards-grid.gv{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;border:none;background:transparent}
.cards-grid.gv .fcard{border:1px solid var(--border);border-radius:var(--r-lg);grid-template-columns:1fr;align-items:flex-start}
.cards-grid.gv .fcard:last-child{border-bottom:1px solid var(--border)}
.cards-grid.gv .fcard-actions{align-self:flex-end}

/* ── QUIZ SECTION ── */
#view-quiz{display:none;padding:0}
.quiz-shell{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start}
@media(max-width:780px){.quiz-shell{grid-template-columns:1fr}}
.quiz-main{}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:2.5rem 2rem;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;transition:all var(--tr)}
.quiz-cat-chip{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx3);border:1px solid var(--border);border-radius:99px;padding:3px 10px}
.quiz-formula{font-size:22px;line-height:1.5;color:var(--tx1);margin:8px 0}
.quiz-hint{font-size:14px;color:var(--tx2);margin-top:4px;display:none}
.quiz-btns{display:flex;gap:8px;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.qbtn{padding:9px 20px;border-radius:var(--r);font-family:var(--ff-body);font-size:13px;font-weight:600;cursor:pointer;border:1px solid;transition:all var(--tr)}
.qbtn-reveal{background:var(--acc-s);color:var(--acc);border-color:rgba(124,106,247,0.3)}
.qbtn-reveal:hover{background:var(--acc-g)}
.qbtn-next{background:var(--teal-s);color:var(--teal);border-color:rgba(61,191,176,0.3)}
.qbtn-next:hover{background:rgba(61,191,176,0.18)}
.quiz-mc{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1.25rem}
.mc-opt{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 14px;font-size:13px;color:var(--tx1);cursor:pointer;transition:all var(--tr);text-align:left}
.mc-opt:hover{border-color:var(--acc);background:var(--acc-s)}
.mc-opt.correct{background:var(--grn-s);border-color:var(--grn);color:var(--grn);pointer-events:none}
.mc-opt.wrong{background:var(--rose-s);border-color:var(--rose);color:var(--rose);pointer-events:none}
.quiz-sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.5rem;display:flex;flex-direction:column;gap:14px;position:sticky;top:100px}
.quiz-mode-toggle{display:flex;gap:6px}
.qtog{flex:1;padding:8px;border-radius:var(--r);border:1px solid var(--border);background:transparent;font-family:var(--ff-body);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all var(--tr)}
.qtog.active{background:var(--acc-s);color:var(--acc);border-color:rgba(124,106,247,0.3)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-label{font-size:12px;color:var(--tx2)}
.stat-val{font-size:20px;font-weight:600;color:var(--tx1);font-family:var(--ff-head)}
.stat-val.green{color:var(--grn)}
.stat-val.amber{color:var(--amber)}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--tx2);cursor:pointer;transition:all var(--tr)}
.chip:hover{border-color:var(--border-s);color:var(--tx1)}
.chip.active{background:var(--acc-s);color:var(--acc);border-color:transparent}
.streak-banner{display:none;align-items:center;gap:8px;background:var(--amber-s);border:1px solid rgba(240,168,48,0.25);border-radius:var(--r);padding:8px 12px;font-size:12px;color:var(--amber);font-weight:600}
.streak-banner.show{display:flex}

/* ── FLASHCARD ── */
#view-flash{display:none;padding:0}
.flash-shell{display:grid;grid-template-columns:1fr 260px;gap:1.5rem;align-items:start}
@media(max-width:780px){.flash-shell{grid-template-columns:1fr}}
.fc-wrap{perspective:1200px}
.fc-inner{width:100%;min-height:260px;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);cursor:pointer}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;gap:10px;text-align:center}
.fc-face-back{transform:rotateY(180deg);background:var(--surface2)}
.fc-tag{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--tx3)}
.fc-formula{font-size:22px;line-height:1.5;color:var(--tx1)}
.fc-desc{font-size:16px;color:var(--tx1);font-weight:500}
.fc-cat{font-size:12px;color:var(--tx2)}
.fc-hint{font-size:12px;color:var(--tx3);margin-top:8px;border-top:1px solid var(--border);padding-top:10px;width:100%}
.flash-nav{display:flex;gap:8px;margin-top:12px;justify-content:center}
.fnav{padding:9px 20px;border-radius:var(--r);font-family:var(--ff-body);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--tx2);transition:all var(--tr)}
.fnav:hover{background:var(--surface2);color:var(--tx1);border-color:var(--border-s)}
.fnav.primary{background:var(--acc);border-color:var(--acc);color:#fff}
.fnav.primary:hover{filter:brightness(1.1)}
.flash-sidebar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.5rem;display:flex;flex-direction:column;gap:12px;position:sticky;top:100px}
.flash-prog-ring{display:flex;justify-content:center;padding:8px 0}
.flash-stats{display:flex;justify-content:space-around;text-align:center;padding:10px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.fstat-n{font-size:22px;font-weight:600;color:var(--acc);font-family:var(--ff-head)}
.fstat-l{font-size:11px;color:var(--tx2)}
.fc-counter{text-align:center;font-size:12px;color:var(--tx3);margin-top:4px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-s);border-radius:var(--r-xl);max-width:580px;width:100%;box-shadow:var(--shadow);animation:mIn 0.18s ease}
@keyframes mIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-title{font-family:var(--ff-head);font-size:1.1rem;color:var(--tx1)}
.modal-body{padding:1.5rem}
.modal-formula-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.75rem;text-align:center;font-size:22px;margin-bottom:1rem;overflow-x:auto}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.minfo{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.minfo-k{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:4px}
.minfo-v{font-size:13px;color:var(--tx1);font-weight:500}
.modal-latex-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-family:var(--ff-mono);font-size:12px;color:var(--acc);word-break:break-all}
.modal-footer{display:flex;gap:7px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);flex-wrap:wrap}
.mbtn{flex:1;min-width:90px;padding:9px 10px;border-radius:var(--r);font-family:var(--ff-body);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--tx1);transition:all var(--tr)}
.mbtn:hover{background:var(--border-s)}
.mbtn.primary{background:var(--acc);color:#fff;border-color:var(--acc)}
.mbtn.primary:hover{filter:brightness(1.1)}

/* ── BOOKMARKS PANEL ── */
.bm-panel{position:fixed;right:0;top:0;bottom:0;z-index:80;width:320px;background:var(--bg2);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
.bm-panel.open{transform:translateX(0)}
.bm-head{display:flex;align-items:center;justify-content:space-between;padding:1.25rem;border-bottom:1px solid var(--border)}
.bm-title{font-family:var(--ff-head);font-size:1rem;color:var(--tx1)}
.bm-body{flex:1;overflow-y:auto;padding:1rem}
.bm-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color var(--tr)}
.bm-item:hover{border-color:var(--acc)}
.bm-item-formula{font-size:13px;color:var(--tx1);margin-bottom:2px;overflow-x:auto;scrollbar-width:none}
.bm-item-formula::-webkit-scrollbar{display:none}
.bm-item-meta{font-size:11px;color:var(--tx3)}
.bm-empty{text-align:center;padding:2.5rem 1rem;color:var(--tx3);font-size:13px;line-height:1.8}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(16px);z-index:99;background:var(--surface2);border:1px solid var(--border-s);border-radius:var(--r);padding:9px 18px;font-size:13px;color:var(--tx1);opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── CONTENT HEAD ── */
.content-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:10px;flex-wrap:wrap}
.view-toggle{display:flex;gap:4px}
.vbtn{width:30px;height:30px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx3);transition:all var(--tr)}
.vbtn.active,.vbtn:hover{background:var(--acc-s);border-color:var(--acc);color:var(--acc)}
.results-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.score-badge{background:var(--grn-s);color:var(--grn);border:1px solid rgba(78,203,132,0.3);border-radius:var(--r);padding:6px 14px;font-size:13px;font-weight:600}

/* ── COLOR CLASSES ── */
.ic-alg{background:rgba(124,106,247,0.12);color:var(--acc)}
.ic-seq{background:rgba(240,168,48,0.12);color:var(--amber)}
.ic-trig{background:rgba(61,191,176,0.12);color:var(--teal)}
.ic-log{background:rgba(168,130,250,0.12);color:#a882fa}
.ic-geo{background:rgba(78,203,132,0.12);color:var(--grn)}
.ic-exp{background:rgba(240,96,112,0.12);color:var(--rose)}
.ic-frac{background:rgba(240,168,48,0.1);color:#e8a030}

let learned   = new Set(JSON.parse(localStorage.getItem('mr2_lrn')||'[]'));

/* ══════════ HELPERS ══════════ */
function key(cat,i){return cat+'::'+i}
function save(){
  localStorage.setItem('mr2_bm',JSON.stringify([...bookmarks]));
  localStorage.setItem('mr2_lrn',JSON.stringify([...learned]));
  localStorage.setItem('mr2_qs',JSON.stringify(qStats));
}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2000);
}
function typeset(el){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise([el]);}
function allFormulas(){
  let r=[];
  for(const cat in DATA) DATA[cat].formulas.forEach((f,i)=>r.push({latex:f[0],desc:f[1],cat,key:key(cat,i),idx:i}));
  return r;
}
function totalCount(){let t=0;for(const c in DATA)t+=DATA[c].formulas.length;return t;}

/* ══════════ THEME ══════════ */
function toggleTheme(){
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
}

/* ══════════ VIEW SWITCH ══════════ */
function switchView(v){
  currentView=v;
  ['library','quiz','flash'].forEach(id=>{
    document.getElementById('view-'+id).style.display=id===v?'':'none';
    document.getElementById('tab-'+id).classList.toggle('active',id===v);
  });
  if(v==='quiz') initQuiz();
  if(v==='flash') initFlash();
}

  const container=document.getElementById('lib-content');
  const sbCats=document.getElementById('sb-cats');
  container.innerHTML=''; sbCats.innerHTML='';
  let total=totalCount();
  document.getElementById('badge-all').textContent=total;
  document.getElementById('results-label').textContent='Showing '+total+' formulas';

  for(const cat in DATA){
    const {icon,ic,formulas}=DATA[cat];
    const link=document.createElement('a');
    link.className='sb-link'+(currentCat===cat?' active':'');
    link.dataset.cat=cat;
    link.innerHTML=cat+' <span class="sb-badge">'+formulas.length+'</span>';
    link.onclick=()=>filterCat(cat,link);
    sbCats.appendChild(link);

    const section=document.createElement('div');
    section.className='cat-section'; section.id='cat-'+cat;
    if(currentCat!=='all'&&currentCat!==cat) section.style.display='none';

    const header=document.createElement('div');
    header.className='sec-header';
    header.innerHTML='<div class="sec-title-row"><div class="sec-icon '+ic+'">'+icon+'</div><div><div class="sec-name">'+cat+'</div><div class="sec-count">'+formulas.length+' formulas</div></div></div><span class="sec-arrow">▼</span>';
    header.onclick=()=>{header.classList.toggle('collapsed');wrap.style.display=header.classList.contains('collapsed')?'none':''};

    const wrap=document.createElement('div');
    wrap.className='cards-grid'+(viewMode==='grid'?' gv':'');

    formulas.forEach((f,i)=>{
      const k=key(cat,i);
      const card=document.createElement('div');
      card.className='fcard'+(learned.has(k)?' learned':'');
      card.innerHTML='<div class="fcard-left"><div class="fcard-formula">\\('+f[0]+'\\)</div><div class="fcard-desc">'+f[1]+'</div></div>'
        +'<div class="fcard-actions">'
        +'<button class="act bm'+(bookmarks.has(k)?' on':'')+'" title="Bookmark" onclick="event.stopPropagation();toggleBm(\''+k+'\',this)">🔖</button>'
        +'<button class="act lrn'+(learned.has(k)?' on':'')+'" title="Learned" onclick="event.stopPropagation();toggleLrn(\''+k+'\',this)">✓</button>'
        +'<button class="act" title="Copy LaTeX" onclick="event.stopPropagation();copyLatex(\''+f[0].replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">📋</button>'
        +'</div>';
      card.addEventListener('click',()=>openModal(k,f[0],f[1],cat));
      wrap.appendChild(card);
    });

    section.appendChild(header);
    section.appendChild(wrap);
    container.appendChild(section);
  }
  typeset(container);
  updateProgress(); updateFavDot();
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.sb-link,.pill').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.sb-link[data-cat="'+cat+'"]').forEach(e=>e.classList.add('active'));
  if(el) el.classList.add('active');
  const total=cat==='all'?totalCount():DATA[cat]?.formulas.length||0;
  document.getElementById('results-label').textContent='Showing '+total+' formulas';
  document.querySelectorAll('.cat-section').forEach(s=>{
    s.style.display=(cat==='all'||s.id==='cat-'+cat)?'':'none';
  });
}

function onSearch(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  let count=0;
  document.querySelectorAll('.fcard').forEach(card=>{
    const show=!q||card.textContent.toLowerCase().includes(q);
    card.style.display=show?'':'none';
    if(show) count++;
  });
  if(q){
    document.querySelectorAll('.cat-section').forEach(s=>s.style.display='');
    document.querySelectorAll('.sec-header').forEach(h=>{h.classList.remove('collapsed');if(h.nextElementSibling)h.nextElementSibling.style.display='';});
    document.getElementById('results-label').textContent=count+' result'+(count!==1?'s':'');
  } else {
    filterCat(currentCat,null);
  }
}

function setView(v){
  viewMode=v;
  document.getElementById('v-list').classList.toggle('active',v==='list');
  document.getElementById('v-grid').classList.toggle('active',v==='grid');
  document.querySelectorAll('.cards-grid').forEach(w=>w.classList.toggle('gv',v==='grid'));
}

/* ══════════ BOOKMARK / LEARN ══════════ */
function toggleBm(k,btn){
  if(bookmarks.has(k)){bookmarks.delete(k);btn&&btn.classList.remove('on');toast('Bookmark removed');}
  else{bookmarks.add(k);btn&&btn.classList.add('on');toast('🔖 Bookmarked!');}
  save(); updateFavDot(); renderBmPanel();
}
function toggleLrn(k,btn){
  const card=btn?btn.closest('.fcard'):null;
  if(learned.has(k)){learned.delete(k);btn&&btn.classList.remove('on');card&&card.classList.remove('learned');toast('Unmarked');}
  else{learned.add(k);btn&&btn.classList.add('on');card&&card.classList.add('learned');toast('✓ Learned!');}
  save(); updateProgress(); updateFlashStats();
}
function updateFavDot(){
  const d=document.getElementById('fav-dot');
  d.textContent=bookmarks.size; d.classList.toggle('on',bookmarks.size>0);
}
function updateProgress(){
  const total=totalCount();
  const pct=total?Math.round(learned.size/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=learned.size+' / '+total;
  document.getElementById('prog-pct').textContent=pct+'%';
}
function copyLatex(latex){navigator.clipboard.writeText(latex).then(()=>toast('LaTeX copied!')).catch(()=>toast('Copy failed'));}

/* ══════════ MODAL ══════════ */
function openModal(k,latex,desc,cat){
  modalKey=k;
  document.getElementById('modal-title').textContent=desc;
  document.getElementById('modal-formula').innerHTML='\\('+latex+'\\)';
  document.getElementById('modal-latex').textContent=latex;
  document.getElementById('modal-meta').innerHTML='<div class="minfo"><div class="minfo-k">Category</div><div class="minfo-v">'+cat+'</div></div><div class="minfo"><div class="minfo-k">Description</div><div class="minfo-v">'+desc+'</div></div>';
  document.getElementById('modal-bm-btn').textContent=bookmarks.has(k)?'★ Bookmarked':'🔖 Bookmark';
  document.getElementById('modal-lrn-btn').textContent=learned.has(k)?'✓ Learned':'✓ Mark learned';
  document.getElementById('modal-bg').classList.add('open');
  typeset(document.getElementById('modal-formula'));
}
function closeModal(e){if(e.target===document.getElementById('modal-bg'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-bg').classList.remove('open');}
function copyModalLatex(){copyLatex(document.getElementById('modal-latex').textContent);}
function toggleBmFromModal(){
  const k=modalKey;
  if(bookmarks.has(k)){bookmarks.delete(k);document.getElementById('modal-bm-btn').textContent='🔖 Bookmark';}
  else{bookmarks.add(k);document.getElementById('modal-bm-btn').textContent='★ Bookmarked';}
  save(); updateFavDot(); renderBmPanel();
}
function toggleLrnFromModal(){
  const k=modalKey;
  if(learned.has(k)){learned.delete(k);document.getElementById('modal-lrn-btn').textContent='✓ Mark learned';}
  else{learned.add(k);document.getElementById('modal-lrn-btn').textContent='✓ Learned';}
  save(); updateProgress(); updateFlashStats();
}

/* ══════════ BOOKMARK PANEL ══════════ */
function toggleBmPanel(){document.getElementById('bm-panel').classList.toggle('open');renderBmPanel();}
function renderBmPanel(){
  const body=document.getElementById('bm-body');
  if(!bookmarks.size){body.innerHTML='<div class="bm-empty">No saved formulas yet.<br>Click 🔖 on any formula to save it.</div>';return;}
  let html='';
  for(const cat in DATA) DATA[cat].formulas.forEach((f,i)=>{
    const k=key(cat,i);
    if(!bookmarks.has(k))return;
    html+='<div class="bm-item" onclick="openModal(\''+k+'\',\''+f[0].replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\',\''+f[1].replace(/'/g,"\\'")+'\',\''+cat+'\')">'
      +'<div class="bm-item-formula">\\('+f[0]+'\\)</div>'
      +'<div class="bm-item-meta">'+f[1]+' — '+cat+'</div></div>';
  });
  body.innerHTML=html; typeset(body);
}

/* ══════════ QUIZ ══════════ */
function buildQuizFilterChips(){
  const area=document.getElementById('quiz-filter-chips');
  area.innerHTML='';
  const all=document.createElement('button');
  all.className='chip'+(quizCatFilter==='all'?' active':'');
  all.textContent='All'; all.onclick=()=>{quizCatFilter='all';buildQuizFilterChips();buildQuizPool();quizIdx=0;renderQuiz();};
  area.appendChild(all);
  for(const cat in DATA){
    const c=document.createElement('button');
    c.className='chip'+(quizCatFilter===cat?' active':'');
    c.textContent=cat; c.onclick=()=>{quizCatFilter=cat;buildQuizFilterChips();buildQuizPool();quizIdx=0;renderQuiz();};
    area.appendChild(c);
  }
}
function buildQuizPool(){
  quizPool=[];
  for(const cat in DATA){
    if(quizCatFilter!=='all'&&quizCatFilter!==cat) continue;
    DATA[cat].formulas.forEach((f,i)=>quizPool.push({latex:f[0],desc:f[1],cat,key:key(cat,i)}));
  }
  quizPool.sort(()=>Math.random()-0.5);
}
function initQuiz(){buildQuizFilterChips();buildQuizPool();quizIdx=0;renderQuiz();updateQuizStats();}
function setQuizMode(m,btn){
  quizMode=m;
  document.querySelectorAll('.qtog').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderQuiz();
}
function renderQuiz(){
  if(!quizPool.length) return;
  const q=quizPool[quizIdx%quizPool.length];
  quizAnswered=false;
  document.getElementById('quiz-cat').textContent=q.cat;
  document.getElementById('quiz-formula').innerHTML='\\('+q.latex+'\\)';
  document.getElementById('quiz-hint').style.display='none';
  document.getElementById('quiz-reveal-btn').textContent='Reveal answer';
  document.getElementById('quiz-result-overlay').classList.remove('show');

  const mcArea=document.getElementById('quiz-mc-area');
  const btnsArea=document.getElementById('quiz-btns');

  if(quizMode==='multiple'){
    mcArea.style.display='grid'; btnsArea.style.display='none';
    mcArea.innerHTML='';
    let opts=[q.desc];
    const pool=quizPool.filter(x=>x.desc!==q.desc);
    while(opts.length<4&&pool.length){const r=pool.splice(Math.floor(Math.random()*pool.length),1)[0];opts.push(r.desc);}
    opts.sort(()=>Math.random()-0.5);
    opts.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='mc-opt'; btn.textContent=opt;
      btn.onclick=()=>checkMcAnswer(btn,opt,q.desc);
      mcArea.appendChild(btn);
    });
  } else {
    mcArea.style.display='none'; btnsArea.style.display='flex';
  }
  typeset(document.getElementById('quiz-card'));
}
function quizReveal(){
  if(!quizPool.length) return;
  const q=quizPool[quizIdx%quizPool.length];
  const hint=document.getElementById('quiz-hint');
  hint.textContent='→ '+q.desc;
  hint.style.display='block';
  document.getElementById('quiz-reveal-btn').textContent='Got it ✓';
}
function quizNext(){quizIdx++;renderQuiz();}
function checkMcAnswer(btn,opt,correct){
  if(quizAnswered) return; quizAnswered=true;
  document.querySelectorAll('.mc-opt').forEach(b=>b.style.pointerEvents='none');
  if(opt===correct){
    btn.classList.add('correct');
    qStats.correct++; qStats.streak++; qStats.best=Math.max(qStats.best,qStats.streak);
    if(qStats.streak>=3){document.getElementById('streak-text').textContent=qStats.streak+' in a row!';document.getElementById('streak-banner').classList.add('show');}
    showQuizResult(true,'Correct!','');
  } else {
    btn.classList.add('wrong');
    qStats.streak=0; document.getElementById('streak-banner').classList.remove('show');
    document.querySelectorAll('.mc-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('correct');});
    showQuizResult(false,'Not quite','The answer is: '+correct);
  }
  qStats.total++; save(); updateQuizStats();
  setTimeout(()=>{document.getElementById('quiz-result-overlay').classList.remove('show');quizNext();},1800);
}
function showQuizResult(ok,msg,sub){
  const ov=document.getElementById('quiz-result-overlay');
  document.getElementById('qres-icon').textContent=ok?'✅':'❌';
  document.getElementById('qres-msg').textContent=msg;
  document.getElementById('qres-desc').textContent=sub;
  ov.classList.add('show');
}
function updateQuizStats(){
  document.getElementById('qs-score').textContent=qStats.correct;
  document.getElementById('qs-correct').textContent=qStats.correct;
  document.getElementById('qs-acc').textContent=qStats.total?Math.round(qStats.correct/qStats.total*100)+'%':'—';
  document.getElementById('qs-streak').textContent=qStats.best;
}
function resetQuizStats(){qStats={total:0,correct:0,streak:0,best:0};save();updateQuizStats();toast('Stats reset');document.getElementById('streak-banner').classList.remove('show');}

/* ══════════ FLASHCARDS ══════════ */
function buildFlashFilterChips(){
  const area=document.getElementById('flash-filter-chips');
  area.innerHTML='';
  const all=document.createElement('button');
  all.className='chip'+(flashCatFilter==='all'?' active':'');
  all.textContent='All'; all.onclick=()=>{flashCatFilter='all';buildFlashFilterChips();buildFlashPool();flashIdx=0;renderFlash();};
  area.appendChild(all);
  for(const cat in DATA){
    const c=document.createElement('button');
    c.className='chip'+(flashCatFilter===cat?' active':'');
    c.textContent=cat; c.onclick=()=>{flashCatFilter=cat;buildFlashFilterChips();buildFlashPool();flashIdx=0;renderFlash();};
    area.appendChild(c);
  }
}
function buildFlashPool(){
  flashPool=[];
  for(const cat in DATA){
    if(flashCatFilter!=='all'&&flashCatFilter!==cat) continue;
    DATA[cat].formulas.forEach((f,i)=>{
      const k=key(cat,i);
      if(flashUnlearnedOnly&&learned.has(k)) return;
      flashPool.push({latex:f[0],desc:f[1],cat,key:k});
    });
  }
  if(flashShuffle_) flashPool.sort(()=>Math.random()-0.5);
}
function initFlash(){buildFlashFilterChips();buildFlashPool();flashIdx=0;flashFlipped=false;renderFlash();updateFlashStats();}
function renderFlash(){
  if(!flashPool.length){
    document.getElementById('fc-formula').innerHTML='No cards available';
    document.getElementById('fc-desc').textContent='Adjust your filters';
    document.getElementById('fc-cat-front').textContent='';
    document.getElementById('fc-cat-back').textContent='';
    document.getElementById('fc-counter').textContent='';
    return;
  }
  const card=flashPool[flashIdx%flashPool.length];
  document.getElementById('fc-formula').innerHTML='\\('+card.latex+'\\)';
  document.getElementById('fc-desc').textContent=card.desc;
  document.getElementById('fc-cat-front').textContent=card.cat;
  document.getElementById('fc-cat-back').textContent=card.cat;
  document.getElementById('fc-counter').textContent='Card '+(flashIdx%flashPool.length+1)+' of '+flashPool.length;
  const markBtn=document.getElementById('flash-mark-btn');
  markBtn.textContent=learned.has(card.key)?'Unmark learned':'Mark learned';
  document.getElementById('fc-inner').classList.remove('flipped');
  flashFlipped=false;
  typeset(document.getElementById('fc-front'));
}
function flipCard(){
  flashFlipped=!flashFlipped;
  document.getElementById('fc-inner').classList.toggle('flipped',flashFlipped);
  if(flashFlipped) typeset(document.getElementById('fc-back'));
}
function flashNext(){flashIdx=(flashIdx+1)%Math.max(flashPool.length,1);flashFlipped=false;document.getElementById('fc-inner').classList.remove('flipped');setTimeout(renderFlash,50);}
function flashPrev(){flashIdx=(flashIdx-1+flashPool.length)%Math.max(flashPool.length,1);flashFlipped=false;document.getElementById('fc-inner').classList.remove('flipped');setTimeout(renderFlash,50);}
function flashMark(){
  if(!flashPool.length) return;
  const card=flashPool[flashIdx%flashPool.length];
  const k=card.key;
  if(learned.has(k)){learned.delete(k);toast('Unmarked');}
  else{learned.add(k);toast('✓ Learned!');}
  save(); updateProgress(); updateFlashStats(); renderFlash();
}
function flashShuffle(){flashShuffle_=document.getElementById('flash-shuffle').checked;buildFlashPool();flashIdx=0;renderFlash();}
function flashFilterUnlearned(){flashUnlearnedOnly=document.getElementById('flash-unlearned').checked;buildFlashPool();flashIdx=0;renderFlash();updateFlashStats();}
function updateFlashStats(){
  const total=totalCount();
  const pct=total?Math.round(learned.size/total*100):0;
  document.getElementById('fs-total').textContent=flashPool.length||totalCount();
  document.getElementById('fs-learned').textContent=learned.size;
  document.getElementById('fs-pct').textContent=pct+'%';
}

/* ══════════ INIT ══════════ */
buildLibrary();
switchView('library');
</script>
