<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Dialog v1.2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    color:white;
}

/* HEADER */
header{
    width:100%;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

/* CONTAINER */
.container{
    margin-top:30px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    padding:20px;
    width:360px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* CONTROLS */
.controls{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

select, button{
    padding:10px;
    border-radius:10px;
    border:none;
    font-size:14px;
    cursor:pointer;
}

button{
    background:white;
}

/* DIALOG */
.dialog{
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* BUBBLE */
.bubble{
    padding:12px;
    border-radius:16px;
    max-width:80%;
    animation:fadeIn .3s;
}

.a{
    background:linear-gradient(135deg,#8e2de2,#4a00e0);
    align-self:flex-start;
}

.b{
    background:linear-gradient(135deg,#00c9ff,#92fe9d);
    align-self:flex-end;
    color:#222;
}

/* BUTTON PLAY */
.play{
    margin-right:6px;
    cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

/* DARK MODE */
.dark{
    background:linear-gradient(135deg,#111,#000);
}

.dark .container{
    background:rgba(0,0,0,0.6);
}

.dark .b{
    color:white;
}
</style>
</head>

<body>

<header>
    <h3>🌍 Language Dialog v1.2</h3>
    <button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

    <div class="controls">
        <select id="lang"></select>
        <button onclick="playAll()">▶ All</button>
    </div>

    <div class="controls">
        <label>Speed</label>
        <input type="range" id="speed" min="0.5" max="1.5" step="0.1" value="1">
    </div>

    <div id="dialogBox" class="dialog"></div>
</div>

<script>
const languages = {
    Cantonese:{ code:"zh-HK",
        a1:"你好！你點呀？",
        b1:"我幾好，你呢？",
        a2:"我都幾好。"
    },
    English:{ code:"en-US",
        a1:"Hello! How are you doing?",
        b1:"I'm doing well, and you?",
        a2:"I'm doing well too."
    },
    French:{ code:"fr-FR",
        a1:"Bonjour! Comment vas-tu?",
        b1:"Je vais bien, et toi?",
        a2:"Je vais bien aussi."
    },
    German:{ code:"de-DE",
        a1:"Hallo! Wie geht es dir?",
        b1:"Mir geht es gut, und dir?",
        a2:"Mir geht es auch gut."
    },
    Indonesian:{ code:"id-ID",
        a1:"Halo! Apa kabar?",
        b1:"Aku baik, kamu?",
        a2:"Aku juga baik."
    },
    Japanese:{ code:"ja-JP",
        a1:"こんにちは！元気？",
        b1:"元気だよ、そっちは？",
        a2:"私も元気。"
    },
    Korean:{ code:"ko-KR",
        a1:"안녕하세요! 어떻게 지내세요?",
        b1:"저는 잘 지내요. 당신은요?",
        a2:"저도 잘 지내요."
    },
    Mandarin:{ code:"zh-CN",
        a1:"你好！你怎么样？",
        b1:"我很好，你呢？",
        a2:"我也很好。"
    },
    Russian:{ code:"ru-RU",
        a1:"Привет! Как дела?",
        b1:"У меня всё хорошо, а у тебя?",
        a2:"У меня тоже всё хорошо."
    },
    Spanish:{ code:"es-ES",
        a1:"¡Hola! ¿Qué tal?",
        b1:"Bien, ¿y tú?",
        a2:"Bien también."
    }
};

const dialogBox = document.getElementById("dialogBox");
const langSelect = document.getElementById("lang");
const speedControl = document.getElementById("speed");

// load saved lang
let savedLang = localStorage.getItem("lang") || "English";

// dropdown
Object.keys(languages).forEach(l=>{
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    if(l===savedLang) opt.selected = true;
    langSelect.appendChild(opt);
});

// speak
function speak(lang,text){
    return new Promise(resolve=>{
        speechSynthesis.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = lang.code;
        utter.rate = speedControl.value;

        utter.onend = resolve;
        speechSynthesis.speak(utter);
    });
}

// typing effect
function typeText(el,text){
    el.textContent="";
    let i=0;
    const interval=setInterval(()=>{
        el.textContent+=text[i];
        i++;
        if(i>=text.length) clearInterval(interval);
    },20);
}

// render
function render(){
    const lang = langSelect.value;
    const d = languages[lang];

    localStorage.setItem("lang", lang);

    dialogBox.innerHTML = `
        <div class="bubble a"><span class="text"></span></div>
        <div class="bubble b"><span class="text"></span></div>
        <div class="bubble a"><span class="text"></span></div>
    `;

    const texts = dialogBox.querySelectorAll(".text");

    typeText(texts[0], d.a1);
    typeText(texts[1], d.b1);
    typeText(texts[2], d.a2);

    // click to speak
    texts.forEach((el,i)=>{
        el.addEventListener("click",()=>{
            speak(d,[d.a1,d.b1,d.a2][i]);
        });
    });
}

// autoplay dialog
async function playAll(){
    const lang = languages[langSelect.value];
    const d = languages[langSelect.value];

    await speak(lang,d.a1);
    await speak(lang,d.b1);
    await speak(lang,d.a2);
}

// dark mode
function toggleDark(){
    document.body.classList.toggle("dark");
}

// init
render();
langSelect.addEventListener("change", render);
</script>

</body>
  </html>
