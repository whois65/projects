<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>

<body>
    <header>
        <h1>Test</h1>
    </header>
    <section id="render"></section>
    <script
        type="importmap">{"imports": {"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js","three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"}}</script>
    <script type="module">
        const $ = x => document.getElementById(x);
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        //import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        const scene = new THREE.Scene(); // Tempat semua objek berada.
        scene.background = new THREE.Color(0xffd6e0);
        const camera = new THREE.PerspectiveCamera( // Mata pemain.
            75, // FOV
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        const renderer = new THREE.WebGLRenderer(); // Yang menggambar scene ke layar.
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(
            Math.min(window.devicePixelRatio, 2)
        );
        $('render').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        //const geometry = new THREE.BoxGeometry(1, 1, 1);
        //const material = new THREE.MeshStandardMaterial({color: 0x00ff00});
        //const cube = new THREE.Mesh(geometry,material);
        //scene.add(cube);

        //const light = new THREE.DirectionalLight(0xffffff, 0);
        //light.position.set(1, 1, 1);
        //scene.add(light);

        camera.position.z = 10;
        camera.position.x = 15;

        const loader = new OBJLoader();

        loader.load(
            './models/Heart.obj',
            function (object) {
                object.position.set(0, 0, 0);
                object.traverse(function (child) {
                    if (child.isMesh) {child.material = new THREE.MeshBasicMaterial({ color: 0xff102b });
                    child.geometry.computeBoundingBox();

                    const center = child.geometry.boundingBox.getCenter(
                        new THREE.Vector3()
                    );
                    child.geometry.translate(
                        -center.x,
                        -center.y,
                        -center.z
                    );
                }
                });
                function animate() {
                    requestAnimationFrame(animate);
                    object.rotation.y += 0.02;
                    
                    //object.rotation.x -= 0.1;
                    
                    //object.rotation.z += 0.0001;
                    controls.update();
                    renderer.render(scene, camera);
                }
                animate();
                scene.add(object);
            }
        );

        //function animate() {
        //    requestAnimationFrame(animate);
        //    //cube.rotation.x += 0.01;
        //    //cube.rotation.y += 0.01;
        //    //cube.rotation.z -= 0.01;
        //    controls.update();
        //    renderer.render(scene, camera);
        //}
        //animate();

        //const axesHelper = new THREE.AxesHelper(5);
        //scene.add(axesHelper);

        window.addEventListener(
            'resize',
            () => {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );
    </script>

</body>

</html>
