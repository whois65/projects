<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Learning Pro</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #search {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section h2 {
      cursor: pointer;
      border-left: 5px solid #38bdf8;
      padding-left: 10px;
      margin-bottom: 10px;
    }

    .cards {
      display: none;
    }

    .section.active .cards {
      display: block;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card:hover {
      background: #334155;
    }

    .formula {
      font-size: 16px;
    }

    .desc {
      font-size: 12px;
      color: #94a3b8;
    }

    .copy-btn {
      background: #38bdf8;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

<h1>Math Learning</h1>

<input type="text" id="search" placeholder="Search formula...">

<div id="content"></div>

<script>
let allCards = [];

async function loadData() {
  const res = await fetch("https://whois65.github.io/JSON/math.json");
  const data = await res.json();

  const container = document.getElementById("content");

  for (const category in data) {
    const section = document.createElement("div");
    section.className = "section";

    const title = document.createElement("h2");
    title.textContent = category;

    const cardsContainer = document.createElement("div");
    cardsContainer.className = "cards";

    title.onclick = () => {
      section.classList.toggle("active");
    };

    data[category].forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const textWrap = document.createElement("div");

      const formula = document.createElement("div");
      formula.className = "formula";
      formula.innerHTML = `\\(${item[0]}\\)`;

      const desc = document.createElement("div");
      desc.className = "desc";
      desc.textContent = item[1];

      textWrap.appendChild(formula);
      textWrap.appendChild(desc);

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy-btn";
      copyBtn.textContent = "Copy";

      copyBtn.onclick = () => {
        navigator.clipboard.writeText(item[0]);
        copyBtn.textContent = "✔";
        setTimeout(() => copyBtn.textContent = "Copy", 1000);
      };

      card.appendChild(textWrap);
      card.appendChild(copyBtn);

      cardsContainer.appendChild(card);

      allCards.push({ card, text: item.join(" ").toLowerCase() });
    });

    section.appendChild(title);
    section.appendChild(cardsContainer);
    container.appendChild(section);
  }

  MathJax.typesetPromise();
}

// 🔍 Search
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  allCards.forEach(obj => {
    obj.card.style.display = obj.text.includes(value) ? "flex" : "none";
  });
});

loadData();
</script>

</body>
</html>
