<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        :root {
            --bg: #09090b;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --text: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
        }
        .light {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.8);
            --surface-hover: rgba(255, 255, 255, 0.95);
            --text: #18181b;
            --text-secondary: #52525b;
            --border: rgba(0, 0, 0, 0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            font-weight: 600;
        }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top left,
                    rgba(59, 130, 246, 0.25),
                    transparent 40%),
                radial-gradient(circle at bottom right,
                    rgba(168, 85, 247, 0.18),
                    transparent 40%);
            z-index: -1;
        }
        #themeBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            background: var(--surface);
            backdrop-filter: blur(20px);
            color: var(--text);
            cursor: pointer;
            z-index: 999;
        }
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }
        header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            color: transparent;
        }
        header p {
            margin-top: 10px;
            color: var(--text-secondary);
        }
        .search-box {
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }
        .search-box input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            backdrop-filter: blur(15px);
            font-size: 15px;
        }
        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        section,
        .stats,
        .search-box,
        #filters {
            max-width: 1400px;
            margin: auto;
        }
        #filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 15px 20px;
        }
        .filter-btn {
            border: none;
            background: var(--surface);
            color: var(--text);
            padding: 10px 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.25s;
        }
        .filter-btn:hover {
            background: #3b82f6;
            color: white;
        }
        .filter-btn.active {
            background: #3b82f6;
            color: white;
        }
        .stats {
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .stat-card {
            padding: 20px 30px;
            border-radius: 20px;
            background: var(--surface);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }
        #group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 15px;
        }
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fade 0.5s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            background: var(--surface-hover);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 16px;
        }
        .card button {
            margin-top: auto;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            color: white;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
        }
        .card button:hover {
            transform: scale(1.02);
        }
        .title {
            font-size: 18px;
            color: var(--text);
        }
        .tags {
            display: flex;
            gap: 3px;
        }
        .tag {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
        }
        /* Animations */
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        async function getimg(url) {
    const cache = await caches.open("thumbnails");
    let response = await cache.match(url);
    if (!response) {
        response = await fetch(url);
        if (response.ok) {
            cache.put(url, response.clone());
        }
    }
    const blob = await response.blob();
    return URL.createObjectURL(blob);
}
async function loadImages() {
    data.forEach(async (item, index) => {
        try {
            const img = document.getElementById(`img-${index}`);
            const url = await getimg(
                `https://image.thum.io/get/${item[2]}`
            );
            img.src = url;
            img.onload = () => {
                URL.revokeObjectURL(url);
            };
        }
        catch (err) {
            console.error(err);
        }
    });
}
        function createCards() {

            >

            <div class="tags">${tags}</div>

        `;

        fragment.appendChild(card);
    });
